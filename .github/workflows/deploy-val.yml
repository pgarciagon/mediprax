name: Deploy VAL

on:
  push:
    tags:
      - 'v*-rc*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to deploy (e.g. v1.1.0-rc1)'
        required: true

concurrency:
  group: deploy-val
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_ref=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VAL
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            cd ~/mediprax-val
            git fetch origin --tags
            git checkout ${{ steps.ref.outputs.deploy_ref }}
            docker compose -p mediprax-val up --build -d
            echo "VAL deployed: ${{ steps.ref.outputs.deploy_ref }} ($(git rev-parse --short HEAD))"
          EOF

      - name: Health check
        run: |
          sleep 20
          STATUS=$(ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -s -o /dev/null -w '%{http_code}' http://localhost:8082/login")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "VAL is healthy: HTTP $STATUS"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
