name: Deploy INT

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-int
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to INT
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd ~/mediprax-int
            git fetch origin main
            git reset --hard origin/main
            # Stop containers and drop the INT database to force fresh EnsureCreated()
            docker compose -p mediprax-int down
            docker compose -p mediprax-int run --rm -e PGPASSWORD=mediprax_int db \
              psql -h db -U mediprax_int -d postgres -c "DROP DATABASE IF EXISTS mediprax_int WITH (FORCE);" 2>/dev/null || true
            docker compose -p mediprax-int up --build -d
            echo "INT deployed: $(git rev-parse --short HEAD)"
          EOF

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            sleep 30
            STATUS=$(ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/login" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "INT is healthy!"
              exit 0
            fi
          done
          echo "Health check failed after 5 attempts"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "docker compose -p mediprax-int logs --tail=30" || true
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
